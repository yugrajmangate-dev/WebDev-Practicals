<!DOCTYPE html>
<html>
<head>
  <title>Result Dashboard</title>

  <!-- EXTERNAL CSS (would be in style.css) -->
  <link rel="stylesheet" href="q07_style.css">

  <!-- INTERNAL CSS -->
  <style>
    body  { font-family: Arial; padding: 20px; background: #f0f4ff; }
    table { border-collapse: collapse; width: 60%; }
    th    { background: navy; color: white; padding: 10px; }
    td    { padding: 8px 10px; border: 1px solid #ccc; }

  </style>
</head>
<body>
  <h1>Student Result Dashboard</h1>
  <p>Name: Rahul Sharma | Roll: 2201</p>

  <table>
    <tr><th>Subject</th><th>Marks</th><th>Grade</th></tr>

    <!-- INLINE CSS for top scorer -->
    <tr style="background: yellow; font-weight: bold;">
      <td>Maths (Top Scorer)</td><td>92</td><td style="color:green">A</td>
    </tr>
    <tr><td>Web Development</td><td>85</td><td style="color:green">A</td></tr>
    <tr><td>DBMS</td><td>78</td><td style="color:green">A</td></tr>
    <tr><td>TOC</td><td>65</td><td style="color:orange">B</td></tr>
    <tr><td>CN</td><td>55</td><td style="color:red">C</td></tr>
  </table>
  <p><b>Total: 375/500 | Percentage: 75% | Result: PASS</b></p>
</body>
</html>
